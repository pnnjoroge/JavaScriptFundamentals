<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./Calculator-part2.css" />
  </head>
<body>

	<div class="calculator">
		

		<div class="container">
				<input type="text" class="display">
			

      		<div class="AllButtons">
				<button data-value="7" class="button">
					<span>7</span>
				</button>

				<button data-value="8" class="button">
					<span>8</span>
				</button>

				<button data-value="9" class="button">
					<span>9</span>
				</button>

				<button data-value="DELETE" class="button action">
					<span>DEL</span>
				</button>
			

				<button data-value="4" class="button">
					<span>4</span>
				</button>

				<button data-value="5" class="button">
					<span>5</span>
				</button>

				<button data-value="6" class="button">
					<span>6</span>
				</button>

				<button data-value="-" class="button operator">
					<span>-</span>
				</button>

				<button data-value="1" class="button">
					<span>1</span>
				</button>

				<button data-value="2" class="button">
					<span>2</span>
				</button>

				<button data-value="3" class="button">
					<span>3</span>
				</button>

				<button data-value="+" class="button operator">
					<span>+</span>
				</button>

				<button data-value="*" class="button operator">
					<span>x</span>
				</button>

				<button data-value="0" class="button">
					<span>0</span>
				</button>

				<button data-value="/" class="button operator">
					<span>÷</span>
				</button>
				
				<button data-value="=" class="button operator">
					<span>=</span>
				</button>

				<div data-value="CLEAR" class="button text">
					<span>AC</span>
				</div>
			</div>

		</div>

	</div>

  <script type='text/javascript' src='./Calculator-part2.js'></script>
</body>
</html>
